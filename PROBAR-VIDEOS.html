<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prueba de videos HMD</title><style>body{background:#080808;color:#eee;font-family:Arial,sans-serif;padding:30px}video{width:100%;max-width:900px;background:#111;margin:12px 0 28px;display:block}code{color:#ffd100}.ok{color:#2bd970}.bad{color:#ff6b6b}.box{border:1px solid #333;padding:18px;margin:18px 0}</style></head><body><h1>Prueba rápida de videos</h1><p>Si aquí no se reproduce, el problema no es el diseño: el MP4 está con códec no compatible para web. Debe ser <code>H.264 + AAC</code>.</p><div class="box"><h2>Hero: <code>assets/video/hero.mp4</code></h2><video controls muted playsinline preload="metadata" src="assets/video/hero.mp4"></video><div id="heroStatus">Probando...</div></div><div class="box"><h2>Vuelo: <code>assets/video/vuelo-hacienda.mp4</code></h2><video controls muted playsinline preload="metadata" src="assets/video/vuelo-hacienda.mp4"></video><div id="vueloStatus">Probando...</div></div><script>document.querySelectorAll('video').forEach((v,i)=>{const st=document.getElementById(i?'vueloStatus':'heroStatus');v.addEventListener('loadedmetadata',()=>{st.innerHTML='<span class="ok">OK:</span> el navegador sí lee este MP4. Duración: '+Math.round(v.duration)+' segundos.'});v.addEventListener('error',()=>{st.innerHTML='<span class="bad">ERROR:</span> el navegador no puede leer este MP4. Convierte el video a MP4 H.264 + AAC y vuelve a poner el mismo nombre.'});setTimeout(()=>{if(v.readyState<1)st.innerHTML='<span class="bad">No carga todavía:</span> revisa nombre exacto, carpeta o códec.'},7000);});</script></body></html>
